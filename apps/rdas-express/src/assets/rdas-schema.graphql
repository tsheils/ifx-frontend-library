type Query {
  diseaseSearch(searchString: String, limit: Int): [Disease]
    @cypher(
      statement: """
      CALL text_search.search_all("name_and_synonyms", $searchString)
      YIELD node, score
      RETURN node ORDER BY score DESC, node.countArticles DESC limit $limit
      """
      columnName: "node"
    )
}

type Query {
  diseaseArticleByYear(
    where: DiseaseWhere
    articleWhere: ArticleWhere
  ): [FilterCount]
    @cypher(
      statement: """
      match (d:Disease)-[has_mention_in]-(a:Article)
      WHERE d.gardId = $where.gardId.eq
      AND (a.isNaturalHistoryStudy = $articleWhere.isNaturalHistoryStudy.eq OR $articleWhere.isNaturalHistoryStudy.eq IS NULL)
      AND (a.isEpidemiologyStudy = $articleWhere.isEpidemiologyStudy.eq OR $articleWhere.isEpidemiologyStudy.eq IS NULL)
      WITH toString(a.publicationYear) as year
      with count(year) as ct, year
      RETURN {term: year, count: ct} as yearCounts order by year DESC
      """
      columnName: "yearCounts"
    )
}

type Query {
  diseaseArticleByEpi(
    where: DiseaseWhere
    articleWhere: ArticleWhere
  ): [FilterCount]
    @cypher(
      statement: """
      match (d:Disease)-[has_mention_in]-(a:Article)
      WHERE d.gardId = $where.gardId.eq
      AND (a.isNaturalHistoryStudy = $articleWhere.isNaturalHistoryStudy.eq OR $articleWhere.isNaturalHistoryStudy.eq IS NULL)
      AND (a.publicationYear IN $articleWhere.publicationYear.in OR $articleWhere.publicationYear.in IS NULL)
      WITH a.isEpidemiologicalStudy as isEpi
      with count(isEpi) as ct, isEpi
      RETURN {term: isEpi, count: ct} as epiCounts order by isEpi DESC
      """
      columnName: "epiCounts"
    )
}

type Query {
  diseaseArticleByNHS(
    where: DiseaseWhere
    articleWhere: ArticleWhere
  ): [FilterCount]
    @cypher(
      statement: """
      match (d:Disease)-[has_mention_in]-(a:Article)
      WHERE d.gardId = $where.gardId.eq
      AND (a.isEpidemiologyStudy = $articleWhere.isEpidemiologyStudy.eq OR $articleWhere.isEpidemiologyStudy.eq IS NULL)
      AND (a.publicationYear IN $articleWhere.publicationYear.in OR $articleWhere.publicationYear.in IS NULL)
      WITH a.isNaturalHistoryStudy as isNhs
      with count(isNhs) as ct, isNhs
      RETURN {term: isNhs, count: ct} as nhsCounts order by isNhs DESC
      """
      columnName: "nhsCounts"
    )
}

type Query {
  diseaseProjectsByYear(where: DiseaseWhere): [FilterCount]
    @cypher(
      statement: """
      MATCH (d:Disease)-[]-(p:Project)
      WHERE d.gardId = $where.gardId.eq
      WITH toString(p.fundingYear) as year, count(p) as ct
      return {term: year, count:ct} as yearCounts order by year DESC
      """
      columnName: "yearCounts"
    )
}

type Query {
  diseaseProjectCostByYear(where: DiseaseWhere): [FilterCount]
    @cypher(
      statement: """
      MATCH (d: Disease)-[]-(p:Project)
      WHERE d.gardId = $where.gardId.eq
      WITH toString(p.fundingYear) as year, sum(p.totalCost) as ct
      return {term: year, count:ct} as yearCounts order by year DESC
      """
      columnName: "yearCounts"
    )
}
type Query {
  trialCountsByStatus(
    where: DiseaseWhere
    clinicalTrialWhere: ClinicalTrialWhere
  ): [FilterCount]
    @cypher(
      statement: """
      MATCH (n:Disease)<-[m:has_clinical_trial]-(cl:ClinicalTrial)
      WHERE n.gardId = $where.gardId.eq
      AND (cl.studyType IN $clinicalTrialWhere.studyType.in OR $clinicalTrialWhere.studyType.in IS NULL)
      AND (cl.phase IN $clinicalTrialWhere.phase.in OR $clinicalTrialWhere.phase.in IS NULL)
      WITH cl.overallStatus as status, count(distinct(cl)) as ct
      return {term: status, count:ct} as data order by ct DESC
      """
      columnName: "data"
    )
}

