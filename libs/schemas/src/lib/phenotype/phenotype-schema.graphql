scalar JSON
extend schema @mutation(operations: [])

type HasPhenotypeProperties @relationshipProperties {
  evidence: String
  hpoFrequency: String
  reference: [String!]
}

type Phenotype @node {
  hpoId: String
  hpoTerm: String
  diseaseHasPhenotype: [Disease!]!
    @relationship(
      type: "has_phenotype"
      direction: IN
      properties: "HasPhenotypeProperties"
    )
}
