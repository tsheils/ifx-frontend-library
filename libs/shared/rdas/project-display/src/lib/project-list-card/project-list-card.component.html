
<div class="row space-between-row">
  <div class="width-75">
    <h3> {{ project()?.title }}</h3>
  </div>
  @if (project()?.coreProjectNumber) {
    <div class="mat-h3">
      {{ project()!.coreProjectNumber }}
    </div>
  }
</div>
<div class="row">
  <div class="width-25">
    <span>Total Cost: {{ project()?.totalCost }}</span>
  </div>
  <div class="width-25">
    <span>Sub Projects: {{ project()?.subProjectsCount }}</span>
  </div>
</div>
